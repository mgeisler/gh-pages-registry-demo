name: Publish registry to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - greet/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Package greet crate
        run: cargo package --no-verify
        working-directory: greet

      - name: Build registry site
        run: |
          set -euo pipefail
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          CRATE_FILE=$(echo greet/target/package/greet-*.crate)
          VERSION=$(echo "$CRATE_FILE" | sed 's|.*/greet-\(.*\)\.crate|\1|')
          SHA=$(sha256sum "$CRATE_FILE" | awk '{print $1}')

          mkdir -p site/crates site/gr/ee

          cp "$CRATE_FILE" site/crates/

          cat > site/config.json <<EOF
          {
            "dl": "https://${OWNER}.github.io/${REPO}/crates/{crate}-{version}.crate"
          }
          EOF

          printf '{"name":"greet","vers":"%s","deps":[],"cksum":"%s","features":{},"yanked":false}\n' \
            "$VERSION" "$SHA" > site/gr/ee/greet

          cat > site/index.html <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>gh-pages-registry-demo</title>
          </head>
          <body>
            <h1>gh-pages-registry-demo</h1>
            <p>This is a minimal Cargo registry used to demonstrate a
            <a href="https://github.com/bazelbuild/rules_rust/issues/3991>checksum mismatch bug</a>
            in <code>rules_rust</code> when a registry is hosted on GitHub Pages.</p>
            <p>The registry hosts one crate:</p>
            <ul>
              <li><code>greet ${VERSION}</code> &mdash; checksum <code>${SHA}</code></li>
            </ul>
            <p>Sparse index: <a href="gr/ee/greet"><code>gr/ee/greet</code></a> &bull;
            Download: <a href="crates/greet-${VERSION}.crate"><code>greet-${VERSION}.crate</code></a></p>
          </body>
          </html>
          EOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v4
